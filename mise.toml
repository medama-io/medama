min_version = { hard = "2026.5.15" }
experimental_monorepo_root = true

[settings]
experimental = true

[monorepo]
config_roots = ["core", "dashboard", "tracker"]

[tools]
go = "1.26.3"
bun = "1.3.14"
gofumpt = "0.10.0"
"go:golang.org/x/tools/gopls" = "0.22.0"
golangci-lint = "2.12.2"
flyctl = "0.4.54"

[env]
CGO_ENABLED = "1"
VERSION = "0.6.2"

[tasks.dev]
description = "Start the API and dashboard dev servers"
run = "mise run core:dev:server ::: dashboard:dev"

[tasks.seed]
description = "Seed local dev databases with deterministic dashboard data"
run = "mise run core:seed"

[tasks."deploy:demo"]
description = "Deploy the demo app to Fly"
run = "flyctl deploy --remote-only"
