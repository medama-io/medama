name: Setup Environment
description: Setup the local environment for a Medama workflow

inputs:
  token:
    description: "GitHub token for the repository"
    required: true

runs:
  using: composite
  steps:
    - name: Setup mise
      uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4
      with:
        experimental: true
        install: true
        install_args: go bun
        cache: true
        github_token: ${{ inputs.token }}

    - name: Install dashboard dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Generate embeds
      shell: bash
      run: mise run //core:generate
